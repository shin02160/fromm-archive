<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💬 Fromm Archive</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0e12;
    --surface: #16161c;
    --surface2: #1e1e26;
    --border: #2a2a36;
    --text: #e8e8f0;
    --text-muted: #7a7a90;
    --accent-sh: #6eb5ff;
    --accent-ds: #ffb347;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family:'Noto Sans KR',sans-serif;
    background:var(--bg); color:var(--text);
    height:100dvh; display:flex; flex-direction:column;
    max-width:480px; margin:0 auto;
  }

  /* 배경 */
  #bg-layer {
    position:fixed; inset:0; z-index:0;
    background-size:cover; background-position:center;
    transition:opacity .5s;
  }
  #bg-layer::after {
    content:''; position:absolute; inset:0;
    background:linear-gradient(to bottom,rgba(14,14,18,.85),rgba(14,14,18,.93));
  }

  /* 헤더 */
  header {
    position:sticky; top:0; z-index:100;
    background:rgba(14,14,18,.92);
    backdrop-filter:blur(16px);
    border-bottom:1px solid var(--border);
    padding:12px 16px;
    display:flex; align-items:center; gap:12px;
  }
  .header-avatar {
    width:38px; height:38px; border-radius:50%;
    background:linear-gradient(135deg,#1a3a5a,#2a5a8f);
    border:1px solid #2a4a6a;
    display:flex; align-items:center; justify-content:center;
    font-size:18px; flex-shrink:0;
  }
  .header-info { flex:1; }
  .header-name { font-size:15px; font-weight:700; letter-spacing:-.3px; }
  .header-sub  { font-size:11px; color:var(--text-muted); margin-top:1px; }
  #bg-btn {
    background:none; border:1px solid var(--border); border-radius:8px;
    color:var(--text-muted); font-size:16px; width:32px; height:32px;
    cursor:pointer; display:flex; align-items:center; justify-content:center;
    transition:all .2s;
  }
  #bg-btn:hover { border-color:var(--accent-sh); color:var(--text); }
  #bg-file { display:none; }

  /* 필터 바 */
  #filter-bar {
    position:sticky; top:63px; z-index:99;
    background:rgba(14,14,18,.9);
    backdrop-filter:blur(12px);
    border-bottom:1px solid var(--border);
    padding:10px 12px;
    display:flex; gap:6px; flex-wrap:wrap; align-items:center;
  }
  .fi {
    background:var(--surface2); border:1px solid var(--border);
    border-radius:8px; color:var(--text); font-family:inherit;
    font-size:12px; padding:6px 10px; outline:none; transition:border-color .2s;
  }
  .fi:focus { border-color:var(--accent-sh); }
  #search { flex:1; min-width:160px; }
  .date-fi { flex:0 1 126px; min-width:110px; }
  input[type=date]::-webkit-calendar-picker-indicator { filter:invert(.4); }
  .mbtn {
    background:var(--surface2); border:1px solid var(--border);
    border-radius:8px; color:var(--text-muted); font-family:inherit;
    font-size:12px; padding:5px 12px; cursor:pointer;
    transition:all .2s; white-space:nowrap;
  }
  .mbtn[data-m="all"].on  { border-color:var(--accent-sh); color:var(--accent-sh); background:rgba(110,181,255,.08); }
  .mbtn[data-m="승협"].on { border-color:var(--accent-sh); color:var(--accent-sh); background:rgba(110,181,255,.08); }
  .mbtn[data-m="동성"].on { border-color:var(--accent-ds); color:var(--accent-ds); background:rgba(255,179,71,.08); }
  #count { font-size:11px; color:var(--text-muted); white-space:nowrap; }

  /* 채팅 */
  #chat {
    position:relative; z-index:1;
    flex:1; overflow-y:auto;
    padding:16px 0 48px;
    scroll-behavior:smooth;
  }
  #chat::-webkit-scrollbar { width:3px; }
  #chat::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }

  /* 날짜 구분 */
  .date-div {
    display:flex; align-items:center;
    margin:22px 16px 14px; gap:12px;
  }
  .date-div::before,.date-div::after {
    content:''; flex:1; height:1px; background:var(--border);
  }
  .date-div span {
    font-size:11px; color:var(--text-muted);
    background:rgba(14,14,18,.8);
    padding:3px 10px; border-radius:20px;
    border:1px solid var(--border); white-space:nowrap;
  }

  /* 메시지 */
  .row {
    display:flex; padding:3px 12px; gap:8px;
    align-items:flex-end;
    animation:su .25s ease;
  }
  @keyframes su { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }

  .av {
    width:34px; height:34px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    font-size:13px; font-weight:700; flex-shrink:0; margin-bottom:2px;
  }
  .av.승협 { background:linear-gradient(135deg,#1a4a7a,#3a7abf); color:#a8d4ff; border:1px solid rgba(110,181,255,.25); }
  .av.동성 { background:linear-gradient(135deg,#7a4a1a,#bf8a3a); color:#ffd4a8; border:1px solid rgba(255,179,71,.25); }

  .bwrap { max-width:68%; }
  .sname { font-size:11px; margin-bottom:4px; padding-left:2px; }
  .bubble {
    padding:10px 14px; font-size:14px; line-height:1.65;
    word-break:break-word;
    background:#1e2a3a; border:1px solid #2a3d54;
    border-radius:18px 18px 18px 4px;
  }
  .bubble img { max-width:100%; border-radius:10px; display:block; margin-top:4px; }
  .meta { display:flex; align-items:center; gap:5px; margin-top:4px; padding-left:2px; }
  .time { font-size:10px; color:var(--text-muted); }
  .badge {
    font-size:9px; padding:1px 5px; border-radius:4px; font-weight:500; border:1px solid;
  }
  .badge.사진 { color:#6eb5ff; background:rgba(110,181,255,.1); border-color:#2a4a7a; }
  .badge.음성 { color:#a78bfa; background:rgba(167,139,250,.1); border-color:#3a2a6a; }
  .badge.영상 { color:#f87171; background:rgba(248,113,113,.1); border-color:#6a2a2a; }
  .memo { font-size:10px; color:var(--text-muted); font-style:italic; margin-top:3px; padding-left:2px; }

  /* 상태 */
  #status {
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    height:200px; gap:12px; color:var(--text-muted);
  }
  .spin {
    width:26px; height:26px; border:2px solid var(--border);
    border-top-color:var(--accent-sh); border-radius:50%;
    animation:sp .8s linear infinite;
  }
  @keyframes sp { to{transform:rotate(360deg)} }

  /* 스크롤 탑 */
  #top-btn {
    position:fixed; bottom:20px; right:16px; z-index:200;
    width:34px; height:34px; border-radius:50%;
    background:var(--surface2); border:1px solid var(--border);
    color:var(--text-muted); font-size:15px; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    opacity:0; pointer-events:none; transition:all .3s;
  }
  #top-btn.show { opacity:1; pointer-events:all; }
</style>
</head>
<body>

<div id="bg-layer"></div>

<header>
  <div class="header-avatar">💬</div>
  <div class="header-info">
    <div class="header-name" id="hname">N.Flying</div>
    <div class="header-sub">Fromm 메시지 아카이브</div>
  </div>
  <button id="bg-btn" title="배경 변경">🖼</button>
  <input type="file" id="bg-file" accept="image/*">
</header>

<div id="filter-bar">
  <input id="search" class="fi" placeholder="🔍  메시지 검색..." oninput="applyFilters()">
  <input id="date-from" type="date" class="fi date-fi" onchange="applyFilters()">
  <input id="date-to"   type="date" class="fi date-fi" onchange="applyFilters()">
  <button class="mbtn on" data-m="all"  onclick="setM(this,'all')">전체</button>
  <button class="mbtn"    data-m="승협" onclick="setM(this,'승협')">승협</button>
  <button class="mbtn"    data-m="동성" onclick="setM(this,'동성')">동성</button>
  <span id="count"></span>
</div>

<div id="chat">
  <div id="status"><div class="spin"></div><div>메시지 불러오는 중...</div></div>
</div>

<button id="top-btn" onclick="chat.scrollTo({top:0,behavior:'smooth'})">↑</button>

<script>
const chat = document.getElementById('chat');
let all = [], curM = 'all';

/* 유틸 */
const d0  = s => s ? s.slice(0,10) : '';
const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
function fmtDate(s){
  if(!s) return '';
  return new Date(s).toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric',weekday:'short'});
}
function fmtTime(s){
  if(!s||!s.includes('T')) return '';
  return new Date(s).toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit',hour12:true});
}
const MCOLOR = { 승협:'#6eb5ff', 동성:'#ffb347' };

/* 렌더 */
function render(msgs){
  if(!msgs.length){
    chat.innerHTML = `<div id="status"><div style="font-size:32px">💬</div><div>표시할 메시지가 없어요</div></div>`;
    document.getElementById('count').textContent = '';
    return;
  }
  document.getElementById('count').textContent = `${msgs.length}개`;

  const frag = document.createDocumentFragment();
  let lastD = '';

  msgs.forEach(m => {
    const d = d0(m.날짜);
    if(d && d !== lastD){
      lastD = d;
      const el = document.createElement('div');
      el.className = 'date-div';
      el.innerHTML = `<span>${fmtDate(m.날짜)}</span>`;
      frag.appendChild(el);
    }

    let content = '';
    if(m.종류==='사진' && m.미디어_URL){
      content = `<img src="${esc(m.미디어_URL)}" alt="사진" loading="lazy">`;
      if(m.내용) content += `<div style="margin-top:6px">${esc(m.내용)}</div>`;
    } else if(m.종류==='음성' && m.미디어_URL){
      content = `<audio controls src="${esc(m.미디어_URL)}" style="height:28px;max-width:200px;margin-top:4px"></audio>`;
      if(m.내용) content += `<div style="margin-top:4px;font-size:12px;color:var(--text-muted)">${esc(m.내용)}</div>`;
    } else if(m.종류==='영상' && m.미디어_URL){
      content = `<video controls src="${esc(m.미디어_URL)}" style="max-width:100%;border-radius:10px"></video>`;
      if(m.내용) content += `<div style="margin-top:4px">${esc(m.내용)}</div>`;
    } else {
      content = esc(m.내용).replace(/\n/g,'<br>');
    }

    const color = MCOLOR[m.멤버] || '#aaa';
    const badge = (m.종류 && m.종류!=='텍스트') ? `<span class="badge ${m.종류}">${m.종류}</span>` : '';
    const memo  = m.메모 ? `<div class="memo">📝 ${esc(m.메모)}</div>` : '';

    const row = document.createElement('div');
    row.className = 'row';
    row.innerHTML = `
      <div class="av ${m.멤버}">${(m.멤버||'?')[0]}</div>
      <div class="bwrap">
        <div class="sname" style="color:${color}">${esc(m.멤버)}</div>
        <div class="bubble">${content}</div>
        <div class="meta">
          ${badge}
          <span class="time">${fmtTime(m.날짜)}</span>
        </div>
        ${memo}
      </div>`;
    frag.appendChild(row);
  });

  chat.innerHTML = '';
  chat.appendChild(frag);
}

/* 필터 */
function applyFilters(){
  const q    = document.getElementById('search').value.trim().toLowerCase();
  const from = document.getElementById('date-from').value;
  const to   = document.getElementById('date-to').value;
  const res  = all.filter(m => {
    if(curM !== 'all' && m.멤버 !== curM) return false;
    if(from && d0(m.날짜) < from) return false;
    if(to   && d0(m.날짜) > to)   return false;
    if(q && !m.내용.toLowerCase().includes(q) && !m.메모.toLowerCase().includes(q)) return false;
    return true;
  });
  render(res);
}

function setM(btn, m){
  document.querySelectorAll('.mbtn').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  curM = m;
  document.getElementById('hname').textContent = m === 'all' ? 'N.Flying' : m;
  applyFilters();
}

/* 배경 */
document.getElementById('bg-btn').onclick = () => document.getElementById('bg-file').click();
document.getElementById('bg-file').onchange = e => {
  const f = e.target.files[0];
  if(f) document.getElementById('bg-layer').style.backgroundImage = `url(${URL.createObjectURL(f)})`;
};

/* 스크롤 탑 */
chat.addEventListener('scroll', () => {
  document.getElementById('top-btn').classList.toggle('show', chat.scrollTop > 300);
});

/* 데이터 로드 */
(async () => {
  try {
    const r = await fetch('/api/messages', { method:'POST' });
    if(!r.ok) throw new Error(`API ${r.status}`);
    const { messages } = await r.json();
    all = messages;
    if(!all.length){
      chat.innerHTML = `<div id="status"><div style="font-size:32px">💬</div><div>아직 저장된 메시지가 없어요</div></div>`;
    } else {
      render(all);
    }
  } catch(e){
    chat.innerHTML = `<div id="status"><div style="font-size:28px">⚠️</div><div>불러오기 실패: ${e.message}</div></div>`;
  }
})();
</script>
</body>
</html>
