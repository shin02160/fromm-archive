<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>💬 Fromm Archive</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#111113; --surface:#1a1a1e; --surface2:#222228; --border:#2e2e38;
  --text:#eeeef2; --text-muted:#76768a; --text-sub:#aaaab8;
  --accent-sh:#6eb5ff; --accent-ds:#ffb347; --red:#ff4d6a;
  --tab-h:72px; --safe-b:env(safe-area-inset-bottom,0px); --app-w:390px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:#000;overflow:hidden;}
body{
  font-family:'Noto Sans KR',sans-serif;
  background:var(--bg);color:var(--text);
  display:flex;flex-direction:column;
  width:var(--app-w);height:100%;
  margin:0 auto;position:relative;overflow:hidden;
}
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
#pages{flex:1;overflow:hidden;position:relative;min-height:0;}
.page{
  position:absolute;inset:0;overflow-y:auto;
  display:none;flex-direction:column;
  padding-bottom:calc(var(--tab-h) + var(--safe-b));
}
.page.active{display:flex;}
.page-header{
  position:sticky;top:0;z-index:50;
  background:rgba(17,17,19,.97);backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border);
  padding:16px 20px 14px;
  display:flex;align-items:center;justify-content:space-between;flex-shrink:0;
}
.page-title{font-size:22px;font-weight:700;letter-spacing:-.5px;}
.icon-btn{
  width:36px;height:36px;border-radius:50%;
  background:var(--surface2);border:none;color:var(--text-sub);font-size:17px;
  display:flex;align-items:center;justify-content:center;cursor:pointer;
}
/* 목록 */
.my-profile{
  display:flex;align-items:center;gap:14px;
  padding:20px 20px 18px;border-bottom:1px solid var(--border);flex-shrink:0;
}
.my-avatar{
  width:56px;height:56px;border-radius:50%;
  border:2px solid #3a3a4a;overflow:hidden;flex-shrink:0;
}
.my-avatar img{width:100%;height:100%;object-fit:cover;}
.my-name{font-size:17px;font-weight:700;letter-spacing:-.3px;}
.my-sub{font-size:12px;color:var(--text-muted);margin-top:3px;}
.section-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:18px 20px 10px;flex-shrink:0;
}
.section-title{font-size:13px;color:var(--text-muted);font-weight:500;}
.section-title span{color:var(--text-sub);margin-left:4px;}
.section-action{font-size:13px;color:var(--text-sub);cursor:pointer;}
.friend-item{
  display:flex;align-items:center;gap:14px;
  padding:14px 20px;cursor:pointer;transition:background .15s;flex-shrink:0;
}
.friend-item:active{background:var(--surface);}
.friend-avatar{width:52px;height:52px;border-radius:50%;flex-shrink:0;overflow:hidden;}
.friend-avatar img{width:100%;height:100%;object-fit:cover;}
.friend-info{flex:1;min-width:0;}
.friend-name{font-size:16px;font-weight:600;letter-spacing:-.2px;}
.friend-status{font-size:12px;color:var(--text-muted);margin-top:3px;white-space:pre;line-height:1.5;}
.friend-heart{display:flex;align-items:center;gap:4px;font-size:14px;font-weight:700;color:var(--red);flex-shrink:0;}
.friend-divider{height:1px;background:var(--border);margin:0 20px;flex-shrink:0;}
/* 채팅 */
.chat-tabs{
  display:flex;border-bottom:1px solid var(--border);
  background:rgba(17,17,19,.97);backdrop-filter:blur(12px);
  position:sticky;top:57px;z-index:40;flex-shrink:0;
}
.chat-tab{
  flex:1;padding:13px 0;text-align:center;
  font-size:14px;font-weight:500;color:var(--text-muted);
  cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;
}
.chat-tab.active{color:var(--text);border-bottom-color:var(--accent-sh);font-weight:700;}
.chat-tab[data-tab="동성"].active{border-bottom-color:var(--accent-ds);}
.chat-filter{
  display:flex;gap:6px;align-items:center;
  padding:8px 10px;
  background:rgba(17,17,19,.95);border-bottom:1px solid var(--border);
  position:sticky;top:106px;z-index:39;flex-shrink:0;
}
.fi{
  background:var(--surface2);border:1px solid var(--border);
  border-radius:8px;color:var(--text);font-family:inherit;
  font-size:12px;padding:6px 8px;outline:none;
}
.fi:focus{border-color:var(--accent-sh);}
#search{flex:1;min-width:0;}
.date-fi{flex:0 0 104px;}
input[type=date]::-webkit-calendar-picker-indicator{filter:invert(.4);}
#msg-count{font-size:11px;color:var(--text-muted);white-space:nowrap;flex-shrink:0;}
#chat-area{flex:1;padding:8px 0;}
.date-div{display:flex;align-items:center;margin:16px 16px 10px;gap:10px;}
.date-div::before,.date-div::after{content:'';flex:1;height:1px;background:var(--border);}
.date-div span{
  font-size:11px;color:var(--text-muted);
  background:rgba(17,17,19,.9);padding:3px 10px;border-radius:20px;
  border:1px solid var(--border);white-space:nowrap;
}
.msg-row{display:flex;padding:3px 12px;gap:8px;align-items:flex-end;animation:su .2s ease;}
@keyframes su{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.av{width:34px;height:34px;border-radius:50%;flex-shrink:0;margin-bottom:2px;overflow:hidden;}
.av img{width:100%;height:100%;object-fit:cover;}
.bwrap{max-width:72%;}
.sname{font-size:11px;margin-bottom:4px;padding-left:2px;color:var(--text-muted);}
.bubble{
  padding:10px 14px;font-size:14px;line-height:1.65;word-break:break-word;
  background:#1e2a3a;border:1px solid #2a3d54;border-radius:18px 18px 18px 4px;
}
.bubble img{max-width:100%;border-radius:10px;display:block;margin-top:4px;}
.msg-meta{display:flex;align-items:center;gap:5px;margin-top:4px;padding-left:2px;}
.msg-time{font-size:10px;color:var(--text-muted);}
.badge{font-size:9px;padding:1px 5px;border-radius:4px;font-weight:500;border:1px solid;}
.badge.사진{color:#6eb5ff;background:rgba(110,181,255,.1);border-color:#2a4a7a;}
.badge.음성{color:#a78bfa;background:rgba(167,139,250,.1);border-color:#3a2a6a;}
.badge.영상{color:#f87171;background:rgba(248,113,113,.1);border-color:#6a2a2a;}
.msg-memo{font-size:10px;color:var(--text-muted);font-style:italic;margin-top:3px;padding-left:2px;}
/* 미디어 */
.media-tabs{
  display:flex;border-bottom:1px solid var(--border);
  position:sticky;top:57px;z-index:40;
  background:rgba(17,17,19,.97);backdrop-filter:blur(12px);flex-shrink:0;
}
.media-tab{
  padding:13px 16px;font-size:13px;font-weight:500;
  color:var(--text-muted);cursor:pointer;
  border-bottom:2px solid transparent;transition:all .2s;
}
.media-tab.active{color:var(--text);border-bottom-color:var(--accent-sh);font-weight:700;}
.media-member-filter{
  display:flex;gap:6px;padding:10px 14px;
  border-bottom:1px solid var(--border);flex-shrink:0;
}
.mf-btn{
  padding:5px 14px;border-radius:20px;font-size:12px;
  background:var(--surface2);border:1px solid var(--border);
  color:var(--text-muted);cursor:pointer;font-family:inherit;transition:all .2s;
}
.mf-btn.active-all{border-color:var(--accent-sh);color:var(--accent-sh);background:rgba(110,181,255,.08);}
.mf-btn.active-sh{border-color:var(--accent-sh);color:var(--accent-sh);background:rgba(110,181,255,.08);}
.mf-btn.active-ds{border-color:var(--accent-ds);color:var(--accent-ds);background:rgba(255,179,71,.08);}
.media-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:2px;}
.media-cell{aspect-ratio:1;overflow:hidden;background:var(--surface2);cursor:pointer;position:relative;}
.media-cell img,.media-cell video{width:100%;height:100%;object-fit:cover;transition:transform .2s;}
.media-cell:active img,.media-cell:active video{transform:scale(.96);}
.media-cell .media-type-icon{position:absolute;bottom:5px;right:6px;font-size:13px;filter:drop-shadow(0 1px 3px rgba(0,0,0,.8));}
.media-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:200px;gap:10px;color:var(--text-muted);}
/* 미디어 모달 */
#media-modal{
  position:fixed;inset:0;z-index:999;background:rgba(0,0,0,.93);
  display:none;align-items:center;justify-content:center;
  flex-direction:column;gap:12px;padding:20px;
}
#media-modal.open{display:flex;}
#media-modal img,#media-modal video{max-width:100%;max-height:75vh;border-radius:10px;object-fit:contain;}
.modal-info{color:var(--text-sub);font-size:12px;text-align:center;}
.modal-close{
  position:absolute;top:16px;right:16px;width:36px;height:36px;border-radius:50%;
  background:rgba(255,255,255,.12);border:none;color:#fff;font-size:20px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
}
/* 설정 모달 */
#settings-modal{
  position:fixed;inset:0;z-index:998;background:rgba(0,0,0,.7);
  display:none;align-items:flex-end;justify-content:center;
}
#settings-modal.open{display:flex;}
.settings-sheet{
  width:100%;max-width:var(--app-w);background:var(--surface);
  border-radius:20px 20px 0 0;padding:20px 20px calc(20px + var(--safe-b));
}
.settings-title{font-size:16px;font-weight:700;margin-bottom:20px;text-align:center;}
.settings-row{
  display:flex;align-items:center;gap:14px;
  padding:14px 0;border-bottom:1px solid var(--border);cursor:pointer;
}
.settings-row:last-of-type{border-bottom:none;}
.settings-icon{font-size:20px;width:36px;text-align:center;}
.settings-label{font-size:14px;flex:1;}
.settings-sub{font-size:12px;color:var(--text-muted);}
.settings-close{
  width:100%;padding:13px;margin-top:16px;
  background:var(--surface2);border:1px solid var(--border);
  border-radius:12px;color:var(--text-muted);font-family:inherit;font-size:14px;cursor:pointer;
}
/* 탭바 */
#tabbar{
  width:100%;background:rgba(17,17,19,.97);backdrop-filter:blur(20px);
  border-top:1px solid var(--border);display:flex;
  padding-bottom:var(--safe-b);z-index:200;height:var(--tab-h);flex-shrink:0;
}
.tab-item{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  gap:4px;cursor:pointer;padding:10px 0 8px;
}
.tab-icon{font-size:22px;filter:grayscale(1) opacity(.45);transition:all .15s;}
.tab-label{font-size:10px;color:var(--text-muted);font-weight:500;}
.tab-item.active .tab-icon{filter:none;transform:scale(1.05);}
.tab-item.active .tab-label{color:var(--text);font-weight:700;}
.tab-item[data-page="chat"].active .tab-label{color:var(--accent-sh);}
.tab-item[data-page="media"].active .tab-label{color:#a78bfa;}
.status-box{display:flex;flex-direction:column;align-items:center;justify-content:center;height:200px;gap:12px;color:var(--text-muted);font-size:13px;}
.spin{width:24px;height:24px;border:2px solid var(--border);border-top-color:var(--accent-sh);border-radius:50%;animation:sp .8s linear infinite;}
@keyframes sp{to{transform:rotate(360deg)}}
</style>
</head>

const MCOLOR = { 승협:'#6eb5ff', 동성:'#ffb347' };

let allMsgs=[], chatMember='all', mediaTab='photo', mediaMember='all';

/* D+ 하트 초기화 */
function calcDays(s) { return Math.floor((new Date() - new Date(s)) / 86400000); }
document.addEventListener('DOMContentLoaded', function() {
  document.getElementById('sh-heart').textContent = '+' + calcDays('2015-05-20');
  document.getElementById('ds-heart').textContent = '+' + calcDays('2020-01-01');
});

const d0  = s => s ? s.slice(0,10) : '';
const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
function fmtDate(s) {
  if(!s) return '';
  return new Date(s).toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric',weekday:'short'});
}
function fmtTime(m) {
  // 시간 필드 우선 사용
  if(m.시간) return m.시간.trim();
  // fallback: 날짜 필드에 T가 포함된 경우
  if(m.날짜&&m.날짜.includes('T')) {
    return new Date(m.날짜).toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit',hour12:true});
  }
  return '';
}
function getMember(m) {
  if(m.멤버) return m.멤버;
  if(m.보낸사람==='이지곰') return '승협';
  if(m.보낸사람==='동성이') return '동성';
  return '';
}
function getDisplayName(m) { return m.보낸사람 || m.멤버 || '?'; }
function getAvatar(member) {
  if(member==='승협') return '<img src="'+SH_PROFILE+'" alt="승협">';
  if(member==='동성') return '<img src="'+DS_PROFILE+'" alt="동성">';
  return member ? member[0] : '?';
}

function goPage(id) {
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab-item').forEach(t=>t.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');
  document.querySelector('.tab-item[data-page="'+id+'"]').classList.add('active');
}
function goChat(member) {
  chatMember = member;
  document.querySelectorAll('.chat-tab').forEach(t=>t.classList.toggle('active', t.dataset.tab===member));
  applyFilters();
  goPage('chat');
}
function setChatTab(el,m) {
  document.querySelectorAll('.chat-tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  chatMember=m; applyFilters();
}

function applyFilters() {
  const q    = document.getElementById('search').value.trim().toLowerCase();
  const from = document.getElementById('date-from').value;
  const to   = document.getElementById('date-to').value;
  const res  = allMsgs.filter(m => {
    const member = getMember(m);
    if(chatMember!=='all' && member!==chatMember) return false;
    if(from && d0(m.날짜)<from) return false;
    if(to   && d0(m.날짜)>to)   return false;
    if(q && !m.내용.toLowerCase().includes(q) && !(m.메모||'').toLowerCase().includes(q)) return false;
    return true;
  });
  renderChat(res);
}

function renderChat(msgs) {
  const area = document.getElementById('chat-area');
  document.getElementById('msg-count').textContent = msgs.length ? msgs.length+'개' : '';
  if(!msgs.length) {
    area.innerHTML='<div class="status-box"><div style="font-size:28px">💬</div><div>메시지가 없어요</div></div>';
    return;
  }
  const frag = document.createDocumentFragment();
  let lastD='';
  msgs.forEach(function(m) {
    const d = d0(m.날짜);
    if(d && d!==lastD) {
      lastD=d;
      const el=document.createElement('div');
      el.className='date-div';
      el.innerHTML='<span>'+fmtDate(m.날짜)+'</span>';
      frag.appendChild(el);
    }
    const member = getMember(m);
    const displayName = getDisplayName(m);
    let content='';
    if(m.종류==='사진'&&m.미디어_URL) {
      content='<img src="'+esc(m.미디어_URL)+'" alt="사진" loading="lazy">';
      if(m.내용) content+='<div style="margin-top:6px">'+esc(m.내용)+'</div>';
    } else if(m.종류==='음성'&&m.미디어_URL) {
      const ext=(m.미디어_URL.split('?')[0].split('.').pop()||'').toLowerCase();
      const atype=ext==='mp3'?'audio/mpeg':ext==='m4a'?'audio/mp4':ext==='ogg'?'audio/ogg':ext==='wav'?'audio/wav':'audio/mp4';
      content='<audio controls style="height:32px;max-width:220px;margin-top:4px"><source src="'+esc(m.미디어_URL)+'" type="'+atype+'"></audio>';
    } else if(m.종류==='영상'&&m.미디어_URL) {
      content='<video controls src="'+esc(m.미디어_URL)+'" style="max-width:100%;border-radius:10px"></video>';
    } else {
      content=esc(m.내용).replace(/\n/g,'<br>');
    }
    const color = MCOLOR[member]||'#aaa';
    const badge = (m.종류&&m.종류!=='텍스트') ? '<span class="badge '+m.종류+'">'+m.종류+'</span>' : '';
    const memo  = m.메모 ? '<div class="msg-memo">📝 '+esc(m.메모)+'</div>' : '';
    const timeStr = fmtTime(m);
    const row=document.createElement('div');
    row.className='msg-row';
    row.innerHTML=
      '<div class="av">'+getAvatar(member)+'</div>'+
      '<div class="bwrap">'+
        '<div class="sname" style="color:'+color+'">'+esc(displayName)+'</div>'+
        '<div style="display:flex;align-items:flex-end;gap:6px">'+
          '<div class="bubble">'+content+'</div>'+
          (timeStr?'<span class="msg-time" style="flex-shrink:0;padding-bottom:2px">'+timeStr+'</span>':'')+
        '</div>'+
        (badge?'<div class="msg-meta">'+badge+'</div>':'')+
        memo+
      '</div>';
    frag.appendChild(row);
  });
  area.innerHTML=''; area.appendChild(frag);
}

function setMediaTab(el,t) {
  document.querySelectorAll('.media-tab').forEach(x=>x.classList.remove('active'));
  el.classList.add('active'); mediaTab=t; renderMedia();
}
function setMediaMember(el,m) {
  document.querySelectorAll('.mf-btn').forEach(x=>x.className='mf-btn');
  el.classList.add(m==='all'?'active-all':m==='승협'?'active-sh':'active-ds');
  mediaMember=m; renderMedia();
}
function renderMedia() {
  const typeMap={photo:'사진',video:'영상',voice:'음성'};
  const type=typeMap[mediaTab];
  const filtered=allMsgs.filter(function(m) {
    const member=getMember(m);
    if(mediaMember!=='all'&&member!==mediaMember) return false;
    return m.종류===type&&m.미디어_URL;
  });
  const area=document.getElementById('media-content');
  if(!filtered.length) {
    area.innerHTML='<div class="media-empty"><div style="font-size:32px">'+(type==='사진'?'📷':type==='영상'?'🎬':'🎵')+'</div><div style="font-size:13px">'+type+' 미디어가 없어요</div></div>';
    return;
  }
  if(type==='음성') {
    area.innerHTML=filtered.map(function(m) {
      const member=getMember(m);
      return '<div style="display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid var(--border)">'+
        '<div class="av" style="width:38px;height:38px;flex-shrink:0">'+getAvatar(member)+'</div>'+
        '<div style="flex:1;min-width:0">'+
          '<div style="font-size:12px;color:'+(MCOLOR[member]||'#aaa')+';margin-bottom:4px">'+esc(getDisplayName(m))+' · '+fmtDate(m.날짜)+'</div>'+
          (function(){var ext=(m.미디어_URL.split('?')[0].split('.').pop()||'').toLowerCase();var at=ext==='mp3'?'audio/mpeg':ext==='m4a'?'audio/mp4':ext==='ogg'?'audio/ogg':ext==='wav'?'audio/wav':'audio/mp4';return '<audio controls style="width:100%;height:32px"><source src="'+esc(m.미디어_URL)+'" type="'+at+'"></audio>';})()+
        '</div></div>';
    }).join('');
    return;
  }
  const grid=document.createElement('div');
  grid.className='media-grid';
  filtered.forEach(function(m) {
    const cell=document.createElement('div');
    cell.className='media-cell';
    cell.innerHTML=type==='영상'
      ?'<video src="'+esc(m.미디어_URL)+'" muted playsinline></video><div class="media-type-icon">▶️</div>'
      :'<img src="'+esc(m.미디어_URL)+'" loading="lazy" alt="">';
    cell.onclick=function() { openModal(m); };
    grid.appendChild(cell);
  });
  area.innerHTML=''; area.appendChild(grid);
}
function openModal(m) {
  const member=getMember(m);
  document.getElementById('modal-content').innerHTML=m.종류==='영상'
    ?'<video controls src="'+esc(m.미디어_URL)+'" style="max-width:100%;max-height:75vh;border-radius:10px"></video>'
    :'<img src="'+esc(m.미디어_URL)+'" style="max-width:100%;max-height:75vh;border-radius:10px">';
  document.getElementById('modal-info').textContent=getDisplayName(m)+' · '+fmtDate(m.날짜)+(fmtTime(m)?' '+fmtTime(m):'');
  document.getElementById('media-modal').classList.add('open');
}
function closeModal() {
  document.getElementById('media-modal').classList.remove('open');
  document.getElementById('modal-content').innerHTML='';
}
document.getElementById('media-modal').addEventListener('click',function(e) {
  if(e.target===document.getElementById('media-modal')) closeModal();
});
function openSettings()  { document.getElementById('settings-modal').classList.add('open'); }
function closeSettings() { document.getElementById('settings-modal').classList.remove('open'); }
function triggerUpload(id) { document.getElementById(id).click(); closeSettings(); }
document.getElementById('settings-modal').addEventListener('click',function(e) {
  if(e.target===document.getElementById('settings-modal')) closeSettings();
});
document.getElementById('my-profile-file').onchange=function(e) {
  const f=e.target.files[0]; if(!f) return;
  document.getElementById('my-avatar-img').src=URL.createObjectURL(f);
};
document.getElementById('bg-file').onchange=function(e) {
  const f=e.target.files[0]; if(!f) return;
  document.getElementById('bg-layer').style.backgroundImage='url('+URL.createObjectURL(f)+')';
};
(async function() {
  try {
    const r=await fetch('/api/messages.js',{method:'POST',headers:{'Content-Type':'application/json'}});
    if(!r.ok) throw new Error('API '+r.status);
    const data=await r.json();
    allMsgs=data.messages.slice().sort(function(a,b){ return a.날짜.localeCompare(b.날짜); });
    renderChat(allMsgs);
    renderMedia();
  } catch(e) {
    document.getElementById('chat-area').innerHTML=
      '<div class="status-box"><div style="font-size:24px">⚠️</div><div>불러오기 실패: '+esc(e.message)+'</div></div>';
  }
})();

</script>
