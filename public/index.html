<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>💬 Fromm Archive</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #111113;
  --surface: #1a1a1e;
  --surface2: #222228;
  --border: #2e2e38;
  --text: #eeeef2;
  --text-muted: #76768a;
  --text-sub: #aaaab8;
  --accent-sh: #6eb5ff;
  --accent-ds: #ffb347;
  --red: #ff4d6a;
  --tab-h: 72px;
  --safe-b: env(safe-area-inset-bottom, 0px);
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body { height:100%; overflow:hidden; }
body {
  font-family:'Noto Sans KR',sans-serif;
  background:var(--bg); color:var(--text);
  display:flex; flex-direction:column;
  max-width:480px; margin:0 auto;
  position:relative;
}

/* ── 스크롤바 ── */
::-webkit-scrollbar { width:3px; }
::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }

/* ── 페이지 컨테이너 ── */
#pages {
  flex:1; overflow:hidden;
  position:relative;
}
.page {
  position:absolute; inset:0;
  overflow-y:auto;
  display:none;
  flex-direction:column;
  padding-bottom:calc(var(--tab-h) + var(--safe-b) + 8px);
}
.page.active { display:flex; }

/* ── 공통 헤더 ── */
.page-header {
  position:sticky; top:0; z-index:50;
  background:rgba(17,17,19,.95);
  backdrop-filter:blur(16px);
  -webkit-backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border);
  padding:16px 20px 14px;
  display:flex; align-items:center; justify-content:space-between;
}
.page-title { font-size:22px; font-weight:700; letter-spacing:-.5px; }
.header-btns { display:flex; gap:8px; }
.icon-btn {
  width:36px; height:36px; border-radius:50%;
  background:var(--surface2); border:none;
  color:var(--text-sub); font-size:17px;
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; transition:all .2s;
}
.icon-btn:active { background:var(--border); }

/* ══════════════════════════════
   목록 페이지
══════════════════════════════ */
/* 내 프로필 */
.my-profile {
  display:flex; align-items:center; gap:14px;
  padding:20px 20px 18px;
  border-bottom:1px solid var(--border);
}
.my-avatar {
  width:56px; height:56px; border-radius:50%;
  background:linear-gradient(135deg,#1a3a5a,#2a5a8f);
  border:2px solid #2a4a6a;
  display:flex; align-items:center; justify-content:center;
  font-size:22px; flex-shrink:0; overflow:hidden;
}
.my-avatar img { width:100%; height:100%; object-fit:cover; }
.my-info { flex:1; }
.my-name { font-size:17px; font-weight:700; letter-spacing:-.3px; }
.my-sub  { font-size:12px; color:var(--text-muted); margin-top:3px; }

/* 섹션 헤더 */
.section-header {
  display:flex; align-items:center; justify-content:space-between;
  padding:18px 20px 10px;
}
.section-title { font-size:13px; color:var(--text-muted); font-weight:500; }
.section-title span { color:var(--text-sub); margin-left:4px; }
.section-action { font-size:13px; color:var(--text-sub); cursor:pointer; }

/* 친구 카드 */
.friend-item {
  display:flex; align-items:center; gap:14px;
  padding:12px 20px;
  cursor:pointer; transition:background .15s;
  position:relative;
}
.friend-item:active { background:var(--surface); }
.friend-avatar {
  width:52px; height:52px; border-radius:50%;
  flex-shrink:0; overflow:hidden;
  display:flex; align-items:center; justify-content:center;
  font-size:20px; font-weight:700;
}
.friend-avatar.승협 { background:linear-gradient(135deg,#1a4a7a,#3a7abf); color:#a8d4ff; border:2px solid rgba(110,181,255,.3); }
.friend-avatar.동성 { background:linear-gradient(135deg,#7a4a1a,#bf8a3a); color:#ffd4a8; border:2px solid rgba(255,179,71,.3); }
.friend-avatar img { width:100%; height:100%; object-fit:cover; }
.friend-info { flex:1; min-width:0; }
.friend-name { font-size:16px; font-weight:600; letter-spacing:-.2px; }
.friend-status { font-size:13px; color:var(--text-muted); margin-top:3px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.friend-heart {
  display:flex; align-items:center; gap:5px;
  font-size:13px; color:var(--text-sub); flex-shrink:0;
}
.heart-icon { color:var(--red); font-size:15px; }
.friend-stats {
  padding:0 20px 14px 86px;
  display:flex; gap:16px;
}
.stat-item { text-align:center; }
.stat-num { font-size:15px; font-weight:700; color:var(--text); }
.stat-label { font-size:10px; color:var(--text-muted); margin-top:1px; }
.friend-divider { height:1px; background:var(--border); margin:0 20px; }

/* ══════════════════════════════
   채팅 페이지
══════════════════════════════ */
/* 멤버 탭 */
.chat-tabs {
  display:flex; gap:0;
  border-bottom:1px solid var(--border);
  padding:0 16px;
  background:rgba(17,17,19,.95);
  backdrop-filter:blur(12px);
  position:sticky; top:65px; z-index:40;
}
.chat-tab {
  flex:1; padding:12px 0; text-align:center;
  font-size:14px; font-weight:500; color:var(--text-muted);
  cursor:pointer; border-bottom:2px solid transparent;
  transition:all .2s; letter-spacing:-.2px;
}
.chat-tab.active { color:var(--text); border-bottom-color:var(--accent-sh); }
.chat-tab[data-tab="동성"].active { border-bottom-color:var(--accent-ds); }

/* 필터 */
.chat-filter {
  display:flex; gap:6px; align-items:center;
  padding:10px 12px;
  background:rgba(17,17,19,.88);
  backdrop-filter:blur(8px);
  border-bottom:1px solid var(--border);
  flex-wrap:wrap;
  position:sticky; top:113px; z-index:39;
}
.fi {
  background:var(--surface2); border:1px solid var(--border);
  border-radius:8px; color:var(--text); font-family:inherit;
  font-size:12px; padding:6px 10px; outline:none;
}
.fi:focus { border-color:var(--accent-sh); }
#search { flex:1; min-width:150px; }
.date-fi { flex:0 1 120px; min-width:100px; }
input[type=date]::-webkit-calendar-picker-indicator { filter:invert(.4); }
#msg-count { font-size:11px; color:var(--text-muted); white-space:nowrap; }

/* 채팅 영역 */
#chat-area {
  flex:1; padding:12px 0 16px;
}

/* 날짜 구분 */
.date-div {
  display:flex; align-items:center;
  margin:20px 16px 12px; gap:10px;
}
.date-div::before,.date-div::after { content:''; flex:1; height:1px; background:var(--border); }
.date-div span {
  font-size:11px; color:var(--text-muted);
  background:rgba(17,17,19,.85);
  padding:3px 10px; border-radius:20px;
  border:1px solid var(--border); white-space:nowrap;
}

/* 메시지 */
.msg-row {
  display:flex; padding:3px 12px; gap:8px;
  align-items:flex-end;
  animation:su .22s ease;
}
@keyframes su { from{opacity:0;transform:translateY(5px)} to{opacity:1;transform:translateY(0)} }
.av {
  width:34px; height:34px; border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  font-size:13px; font-weight:700; flex-shrink:0; margin-bottom:2px;
}
.av.승협 { background:linear-gradient(135deg,#1a4a7a,#3a7abf); color:#a8d4ff; border:1px solid rgba(110,181,255,.25); }
.av.동성 { background:linear-gradient(135deg,#7a4a1a,#bf8a3a); color:#ffd4a8; border:1px solid rgba(255,179,71,.25); }
.bwrap { max-width:68%; }
.sname { font-size:11px; margin-bottom:4px; padding-left:2px; }
.bubble {
  padding:10px 14px; font-size:14px; line-height:1.65;
  word-break:break-word;
  background:#1e2a3a; border:1px solid #2a3d54;
  border-radius:18px 18px 18px 4px;
}
.bubble img { max-width:100%; border-radius:10px; display:block; margin-top:4px; }
.msg-meta { display:flex; align-items:center; gap:5px; margin-top:4px; padding-left:2px; }
.msg-time { font-size:10px; color:var(--text-muted); }
.badge { font-size:9px; padding:1px 5px; border-radius:4px; font-weight:500; border:1px solid; }
.badge.사진 { color:#6eb5ff; background:rgba(110,181,255,.1); border-color:#2a4a7a; }
.badge.음성 { color:#a78bfa; background:rgba(167,139,250,.1); border-color:#3a2a6a; }
.badge.영상 { color:#f87171; background:rgba(248,113,113,.1); border-color:#6a2a2a; }
.msg-memo { font-size:10px; color:var(--text-muted); font-style:italic; margin-top:3px; padding-left:2px; }

/* ══════════════════════════════
   미디어 페이지
══════════════════════════════ */
.media-tabs {
  display:flex; gap:0;
  border-bottom:1px solid var(--border);
  padding:0 16px;
  position:sticky; top:65px; z-index:40;
  background:rgba(17,17,19,.95);
  backdrop-filter:blur(12px);
}
.media-tab {
  padding:12px 16px; font-size:13px; font-weight:500;
  color:var(--text-muted); cursor:pointer;
  border-bottom:2px solid transparent; transition:all .2s;
}
.media-tab.active { color:var(--text); border-bottom-color:var(--accent-sh); }

.media-member-filter {
  display:flex; gap:6px; padding:12px 16px;
  border-bottom:1px solid var(--border);
}
.mf-btn {
  padding:5px 14px; border-radius:20px; font-size:12px;
  background:var(--surface2); border:1px solid var(--border);
  color:var(--text-muted); cursor:pointer; font-family:inherit;
  transition:all .2s;
}
.mf-btn.active-all   { border-color:var(--accent-sh); color:var(--accent-sh); background:rgba(110,181,255,.08); }
.mf-btn.active-sh    { border-color:var(--accent-sh); color:var(--accent-sh); background:rgba(110,181,255,.08); }
.mf-btn.active-ds    { border-color:var(--accent-ds); color:var(--accent-ds); background:rgba(255,179,71,.08); }

.media-grid {
  display:grid; grid-template-columns:repeat(3,1fr);
  gap:2px; padding:2px;
}
.media-cell {
  aspect-ratio:1; overflow:hidden;
  background:var(--surface2); cursor:pointer;
  position:relative;
}
.media-cell img, .media-cell video {
  width:100%; height:100%; object-fit:cover;
  transition:transform .2s;
}
.media-cell:active img, .media-cell:active video { transform:scale(.96); }
.media-cell .media-type-icon {
  position:absolute; bottom:5px; right:6px;
  font-size:13px; filter:drop-shadow(0 1px 3px rgba(0,0,0,.8));
}
.media-empty {
  display:flex; flex-direction:column; align-items:center;
  justify-content:center; height:200px; gap:10px; color:var(--text-muted);
}

/* 미디어 모달 */
#media-modal {
  position:fixed; inset:0; z-index:999;
  background:rgba(0,0,0,.92);
  display:none; align-items:center; justify-content:center;
  flex-direction:column; gap:12px;
  padding:20px;
}
#media-modal.open { display:flex; }
#media-modal img, #media-modal video {
  max-width:100%; max-height:75vh;
  border-radius:10px; object-fit:contain;
}
.modal-info { color:var(--text-sub); font-size:12px; text-align:center; }
.modal-close {
  position:absolute; top:16px; right:16px;
  width:36px; height:36px; border-radius:50%;
  background:rgba(255,255,255,.1); border:none;
  color:#fff; font-size:20px; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
}

/* ══════════════════════════════
   하단 탭바
══════════════════════════════ */
#tabbar {
  position:fixed; bottom:0; left:50%; transform:translateX(-50%);
  width:100%; max-width:480px;
  background:rgba(17,17,19,.96);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  border-top:1px solid var(--border);
  display:flex;
  padding-bottom:calc(var(--safe-b));
  z-index:200;
  height:var(--tab-h);
}
.tab-item {
  flex:1; display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  gap:4px; cursor:pointer;
  padding:10px 0 8px;
  transition:all .15s;
}
.tab-icon {
  font-size:22px; transition:transform .2s;
  filter:grayscale(1) opacity(.5);
}
.tab-label {
  font-size:10px; color:var(--text-muted);
  font-weight:500; letter-spacing:-.2px;
}
.tab-item.active .tab-icon { filter:none; transform:scale(1.08); }
.tab-item.active .tab-label { color:var(--text); }
.tab-item[data-page="list"].active   .tab-icon { filter:none; }
.tab-item[data-page="chat"].active   .tab-label { color:var(--accent-sh); }
.tab-item[data-page="media"].active  .tab-label { color:#a78bfa; }

/* ── 상태 ── */
.status-box {
  display:flex; flex-direction:column; align-items:center;
  justify-content:center; height:200px; gap:12px; color:var(--text-muted);
}
.spin {
  width:24px; height:24px; border:2px solid var(--border);
  border-top-color:var(--accent-sh); border-radius:50%;
  animation:sp .8s linear infinite;
}
@keyframes sp { to{transform:rotate(360deg)} }
</style>
</head>
<body>

<!-- ══ 페이지들 ══ -->
<div id="pages">

  <!-- 목록 페이지 -->
  <div class="page active" id="page-list">
    <div class="page-header">
      <div class="page-title">목록</div>
      <div class="header-btns">
        <button class="icon-btn">👤</button>
        <button class="icon-btn">⚙️</button>
      </div>
    </div>

    <!-- 내 프로필 -->
    <div class="my-profile">
      <div class="my-avatar">🌸</div>
      <div class="my-info">
        <div class="my-name">N.Fia 💕</div>
        <div class="my-sub">N.Flying 팬</div>
      </div>
    </div>

    <!-- Best 프롬친구 -->
    <div class="section-header">
      <div class="section-title">Best프롬친구 <span>0</span></div>
    </div>

    <!-- 프롬친구 -->
    <div class="section-header">
      <div class="section-title">프롬친구 <span id="friend-count">2</span></div>
      <div class="section-action" onclick="goChat('all')">상세보기</div>
    </div>

    <!-- 승협 -->
    <div class="friend-item" onclick="goChat('승협')">
      <div class="friend-avatar 승협" id="sh-avatar">승</div>
      <div class="friend-info">
        <div class="friend-name">이지곰</div>
        <div class="friend-status" id="sh-last">—</div>
      </div>
      <div class="friend-heart">
        <span class="heart-icon">❤️</span>
        <span id="sh-heart">—</span>
      </div>
    </div>
    <div class="friend-stats">
      <div class="stat-item">
        <div class="stat-num" id="sh-msg-count">—</div>
        <div class="stat-label">메시지</div>
      </div>
      <div class="stat-item">
        <div class="stat-num" id="sh-photo-count">—</div>
        <div class="stat-label">사진</div>
      </div>
    </div>

    <div class="friend-divider"></div>

    <!-- 동성 -->
    <div class="friend-item" onclick="goChat('동성')">
      <div class="friend-avatar 동성" id="ds-avatar">동</div>
      <div class="friend-info">
        <div class="friend-name">동성이</div>
        <div class="friend-status" id="ds-last">—</div>
      </div>
      <div class="friend-heart">
        <span class="heart-icon">❤️</span>
        <span id="ds-heart">—</span>
      </div>
    </div>
    <div class="friend-stats">
      <div class="stat-item">
        <div class="stat-num" id="ds-msg-count">—</div>
        <div class="stat-label">메시지</div>
      </div>
      <div class="stat-item">
        <div class="stat-num" id="ds-photo-count">—</div>
        <div class="stat-label">사진</div>
      </div>
    </div>

    <!-- 관심아티 -->
    <div class="section-header" style="margin-top:8px">
      <div class="section-title">관심아티 <span>0</span></div>
      <div class="section-action">편집</div>
    </div>
  </div>

  <!-- 채팅 페이지 -->
  <div class="page" id="page-chat">
    <div class="page-header">
      <div class="page-title">채팅</div>
    </div>
    <div class="chat-tabs">
      <div class="chat-tab active" data-tab="all"  onclick="setChatTab(this,'all')">전체</div>
      <div class="chat-tab"        data-tab="승협" onclick="setChatTab(this,'승협')">승협</div>
      <div class="chat-tab"        data-tab="동성" onclick="setChatTab(this,'동성')">동성</div>
    </div>
    <div class="chat-filter">
      <input id="search" class="fi" placeholder="🔍  검색..." oninput="applyFilters()">
      <input id="date-from" type="date" class="fi date-fi" onchange="applyFilters()">
      <input id="date-to"   type="date" class="fi date-fi" onchange="applyFilters()">
      <span id="msg-count"></span>
    </div>
    <div id="chat-area">
      <div class="status-box"><div class="spin"></div><div>불러오는 중...</div></div>
    </div>
  </div>

  <!-- 미디어 페이지 -->
  <div class="page" id="page-media">
    <div class="page-header">
      <div class="page-title">미디어</div>
    </div>
    <div class="media-tabs">
      <div class="media-tab active" data-mt="photo" onclick="setMediaTab(this,'photo')">사진</div>
      <div class="media-tab"        data-mt="video" onclick="setMediaTab(this,'video')">영상</div>
      <div class="media-tab"        data-mt="voice" onclick="setMediaTab(this,'voice')">음성</div>
    </div>
    <div class="media-member-filter">
      <button class="mf-btn active-all" data-mf="all"  onclick="setMediaMember(this,'all')">전체</button>
      <button class="mf-btn"            data-mf="승협" onclick="setMediaMember(this,'승협')">승협</button>
      <button class="mf-btn"            data-mf="동성" onclick="setMediaMember(this,'동성')">동성</button>
    </div>
    <div id="media-content">
      <div class="status-box"><div class="spin"></div><div>불러오는 중...</div></div>
    </div>
  </div>

</div>

<!-- 하단 탭바 -->
<div id="tabbar">
  <div class="tab-item active" data-page="list" onclick="goPage('list')">
    <div class="tab-icon">⭐</div>
    <div class="tab-label">목록</div>
  </div>
  <div class="tab-item" data-page="chat" onclick="goPage('chat')">
    <div class="tab-icon">💬</div>
    <div class="tab-label">채팅</div>
  </div>
  <div class="tab-item" data-page="media" onclick="goPage('media')">
    <div class="tab-icon">🖼️</div>
    <div class="tab-label">미디어</div>
  </div>
</div>

<!-- 미디어 모달 -->
<div id="media-modal">
  <button class="modal-close" onclick="closeModal()">✕</button>
  <div id="modal-content"></div>
  <div class="modal-info" id="modal-info"></div>
</div>

<script>
/* ══ 전역 상태 ══ */
let allMsgs = [];
let chatMember = 'all';
let mediaTab = 'photo';
let mediaMember = 'all';

/* ══ 유틸 ══ */
const d0 = s => s ? s.slice(0,10) : '';
const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
function fmtDate(s){
  if(!s) return '';
  return new Date(s).toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric',weekday:'short'});
}
function fmtTime(s){
  if(!s||!s.includes('T')) return '';
  return new Date(s).toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit',hour12:true});
}
const MCOLOR = { 승협:'#6eb5ff', 동성:'#ffb347' };

/* ══ 탭 전환 ══ */
function goPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
  document.getElementById('page-' + id).classList.add('active');
  document.querySelector(`.tab-item[data-page="${id}"]`).classList.add('active');
}

function goChat(member) {
  if(member !== 'all') {
    chatMember = member;
    document.querySelectorAll('.chat-tab').forEach(t => {
      t.classList.toggle('active', t.dataset.tab === member);
    });
    applyFilters();
  }
  goPage('chat');
}

/* ══ 채팅 탭 ══ */
function setChatTab(el, m) {
  document.querySelectorAll('.chat-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  chatMember = m;
  applyFilters();
}

/* ══ 채팅 렌더 ══ */
function applyFilters() {
  const q    = document.getElementById('search').value.trim().toLowerCase();
  const from = document.getElementById('date-from').value;
  const to   = document.getElementById('date-to').value;
  const res  = allMsgs.filter(m => {
    if(chatMember !== 'all' && m.멤버 !== chatMember) return false;
    if(from && d0(m.날짜) < from) return false;
    if(to   && d0(m.날짜) > to)   return false;
    if(q && !m.내용.toLowerCase().includes(q) && !m.메모.toLowerCase().includes(q)) return false;
    return true;
  });
  renderChat(res);
}

function renderChat(msgs) {
  const area = document.getElementById('chat-area');
  document.getElementById('msg-count').textContent = msgs.length ? `${msgs.length}개` : '';

  if(!msgs.length) {
    area.innerHTML = `<div class="status-box"><div style="font-size:30px">💬</div><div>메시지가 없어요</div></div>`;
    return;
  }

  const frag = document.createDocumentFragment();
  let lastD = '';

  msgs.forEach(m => {
    const d = d0(m.날짜);
    if(d && d !== lastD) {
      lastD = d;
      const el = document.createElement('div');
      el.className = 'date-div';
      el.innerHTML = `<span>${fmtDate(m.날짜)}</span>`;
      frag.appendChild(el);
    }

    let content = '';
    if(m.종류==='사진' && m.미디어_URL) {
      content = `<img src="${esc(m.미디어_URL)}" alt="사진" loading="lazy">`;
      if(m.내용) content += `<div style="margin-top:6px">${esc(m.내용)}</div>`;
    } else if(m.종류==='음성' && m.미디어_URL) {
      content = `<audio controls src="${esc(m.미디어_URL)}" style="height:28px;max-width:200px;margin-top:4px"></audio>`;
      if(m.내용) content += `<div style="margin-top:4px;font-size:12px;color:var(--text-muted)">${esc(m.내용)}</div>`;
    } else if(m.종류==='영상' && m.미디어_URL) {
      content = `<video controls src="${esc(m.미디어_URL)}" style="max-width:100%;border-radius:10px"></video>`;
      if(m.내용) content += `<div style="margin-top:4px">${esc(m.내용)}</div>`;
    } else {
      content = esc(m.내용).replace(/\n/g,'<br>');
    }

    const color = MCOLOR[m.멤버] || '#aaa';
    const badge = (m.종류 && m.종류!=='텍스트') ? `<span class="badge ${m.종류}">${m.종류}</span>` : '';
    const memo  = m.메모 ? `<div class="msg-memo">📝 ${esc(m.메모)}</div>` : '';

    const row = document.createElement('div');
    row.className = 'msg-row';
    row.innerHTML = `
      <div class="av ${m.멤버}">${(m.멤버||'?')[0]}</div>
      <div class="bwrap">
        <div class="sname" style="color:${color}">${esc(m.멤버)}</div>
        <div class="bubble">${content}</div>
        <div class="msg-meta">${badge}<span class="msg-time">${fmtTime(m.날짜)}</span></div>
        ${memo}
      </div>`;
    frag.appendChild(row);
  });

  area.innerHTML = '';
  area.appendChild(frag);
}

/* ══ 목록 통계 ══ */
function updateFriendStats() {
  const shMsgs   = allMsgs.filter(m => m.멤버==='승협');
  const dsMsgs   = allMsgs.filter(m => m.멤버==='동성');
  const shPhotos = shMsgs.filter(m => m.종류==='사진').length;
  const dsPhotos = dsMsgs.filter(m => m.종류==='사진').length;

  document.getElementById('sh-msg-count').textContent   = shMsgs.length;
  document.getElementById('sh-photo-count').textContent = shPhotos;
  document.getElementById('ds-msg-count').textContent   = dsMsgs.length;
  document.getElementById('ds-photo-count').textContent = dsPhotos;

  // 마지막 메시지
  const shLast = shMsgs[shMsgs.length-1];
  const dsLast = dsMsgs[dsMsgs.length-1];
  document.getElementById('sh-last').textContent = shLast ? shLast.내용.slice(0,20) + (shLast.내용.length>20?'…':'') : '—';
  document.getElementById('ds-last').textContent = dsLast ? dsLast.내용.slice(0,20) + (dsLast.내용.length>20?'…':'') : '—';

  // 하트 (메시지 수 기반 표시)
  document.getElementById('sh-heart').textContent = '+' + (shMsgs.length * 3);
  document.getElementById('ds-heart').textContent = '+' + (dsMsgs.length * 3);
}

/* ══ 미디어 ══ */
function setMediaTab(el, t) {
  document.querySelectorAll('.media-tab').forEach(x => x.classList.remove('active'));
  el.classList.add('active');
  mediaTab = t;
  renderMedia();
}

function setMediaMember(el, m) {
  document.querySelectorAll('.mf-btn').forEach(x => {
    x.className = 'mf-btn';
  });
  const cls = m==='all' ? 'active-all' : m==='승협' ? 'active-sh' : 'active-ds';
  el.classList.add(cls);
  mediaMember = m;
  renderMedia();
}

function renderMedia() {
  const typeMap = { photo:'사진', video:'영상', voice:'음성' };
  const type = typeMap[mediaTab];
  const filtered = allMsgs.filter(m => {
    if(mediaMember !== 'all' && m.멤버 !== mediaMember) return false;
    return m.종류 === type && m.미디어_URL;
  });

  const area = document.getElementById('media-content');
  if(!filtered.length) {
    area.innerHTML = `<div class="media-empty"><div style="font-size:32px">${type==='사진'?'📷':type==='영상'?'🎬':'🎵'}</div><div style="font-size:13px;color:var(--text-muted)">${type} 미디어가 없어요</div></div>`;
    return;
  }

  if(type === '음성') {
    // 음성은 리스트
    area.innerHTML = filtered.map(m => `
      <div style="display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid var(--border)">
        <div class="av ${m.멤버}" style="width:38px;height:38px;flex-shrink:0">${(m.멤버||'?')[0]}</div>
        <div style="flex:1;min-width:0">
          <div style="font-size:12px;color:${MCOLOR[m.멤버]||'#aaa'};margin-bottom:4px">${esc(m.멤버)} · ${fmtDate(m.날짜)}</div>
          <audio controls src="${esc(m.미디어_URL)}" style="width:100%;height:28px"></audio>
          ${m.내용 ? `<div style="font-size:12px;color:var(--text-muted);margin-top:4px">${esc(m.내용)}</div>` : ''}
        </div>
      </div>`).join('');
    return;
  }

  // 사진/영상 그리드
  const grid = document.createElement('div');
  grid.className = 'media-grid';
  filtered.forEach(m => {
    const cell = document.createElement('div');
    cell.className = 'media-cell';
    if(type === '영상') {
      cell.innerHTML = `<video src="${esc(m.미디어_URL)}" muted playsinline></video><div class="media-type-icon">▶️</div>`;
    } else {
      cell.innerHTML = `<img src="${esc(m.미디어_URL)}" loading="lazy" alt="">`;
    }
    cell.onclick = () => openModal(m);
    grid.appendChild(cell);
  });
  area.innerHTML = '';
  area.appendChild(grid);
}

/* ══ 미디어 모달 ══ */
function openModal(m) {
  const modal = document.getElementById('media-modal');
  const content = document.getElementById('modal-content');
  const info = document.getElementById('modal-info');
  if(m.종류==='영상') {
    content.innerHTML = `<video controls src="${esc(m.미디어_URL)}" style="max-width:100%;max-height:75vh;border-radius:10px"></video>`;
  } else {
    content.innerHTML = `<img src="${esc(m.미디어_URL)}" style="max-width:100%;max-height:75vh;border-radius:10px">`;
  }
  info.textContent = `${m.멤버} · ${fmtDate(m.날짜)} ${fmtTime(m.날짜)}`;
  modal.classList.add('open');
}
function closeModal() {
  document.getElementById('media-modal').classList.remove('open');
  document.getElementById('modal-content').innerHTML = '';
}
document.getElementById('media-modal').addEventListener('click', e => {
  if(e.target === document.getElementById('media-modal')) closeModal();
});

/* ══ 데이터 로드 ══ */
(async () => {
  try {
    const r = await fetch('/api/messages', { method:'POST' });
    if(!r.ok) throw new Error(`API ${r.status}`);
    const { messages } = await r.json();
    allMsgs = messages;
    renderChat(allMsgs);
    renderMedia();
    updateFriendStats();
  } catch(e) {
    document.getElementById('chat-area').innerHTML =
      `<div class="status-box"><div style="font-size:26px">⚠️</div><div>불러오기 실패: ${esc(e.message)}</div></div>`;
    document.getElementById('media-content').innerHTML =
      `<div class="status-box"><div style="font-size:26px">⚠️</div><div>불러오기 실패</div></div>`;
  }
})();
</script>
</body>
